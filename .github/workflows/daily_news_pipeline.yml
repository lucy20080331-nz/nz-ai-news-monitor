name: AI News Monitor Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-news-monitor-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    name: Run incremental news pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
      NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

      SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ vars.SNOWFLAKE_USER }}
      SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ vars.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_RAW_SCHEMA: ${{ vars.SNOWFLAKE_RAW_SCHEMA }}
      DBT_SCHEMA: ${{ vars.DBT_SCHEMA }}
      GROQ_MODEL: ${{ vars.GROQ_MODEL }}

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<'EOF'
          ai_news_dbt:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
                user: "{{ env_var('SNOWFLAKE_USER') }}"
                password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
                role: "{{ env_var('SNOWFLAKE_ROLE') }}"
                warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
                database: "{{ env_var('SNOWFLAKE_DATABASE') }}"
                schema: "{{ env_var('DBT_SCHEMA') }}"
                threads: 4
                client_session_keep_alive: false
          EOF

      - name: Test dbt connection
        run: |
          dbt debug \
            --project-dir ai_news_dbt \
            --profiles-dir ~/.dbt \
            --target dev

      - name: Run incremental pipeline
        run: python ingest_news_incremental.py